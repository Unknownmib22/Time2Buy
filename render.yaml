services:
  # Backend Web Service
  - type: web
    name: time2buy-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false # User will set this in Render UI
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: time2buy-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npx expo export -p web
    publishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false # User will set this to the Backend URL + /api
